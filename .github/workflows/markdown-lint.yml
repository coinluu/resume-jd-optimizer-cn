name: Markdown lint

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Lint Markdown
        run: npx --yes markdownlint-cli2@0.18.1 "**/*.md" "#.git/**"
